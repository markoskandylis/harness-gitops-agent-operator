---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.19.0
  name: harnessgitopsagents.infrastructure.kandylis.co.uk
spec:
  group: infrastructure.kandylis.co.uk
  names:
    kind: HarnessGitopsAgent
    listKind: HarnessGitopsAgentList
    plural: harnessgitopsagents
    singular: harnessgitopsagent
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.agentIdentifier
      name: Agent
      type: string
    - jsonPath: .status.clusterIdentifier
      name: Cluster
      type: string
    - jsonPath: .status.argoProjectId
      name: ArgoProject
      type: string
    name: v1
    schema:
      openAPIV3Schema:
        description: HarnessGitopsAgent is the Schema for the harnessgitopsagents
          API
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: spec defines the desired state of HarnessGitopsAgent
            properties:
              accountId:
                description: AccountId is the Harness Account Identifier
                type: string
              apiKeySecretRef:
                description: |-
                  ApiKeySecretRef is the name of the Secret containing the Harness API Key.
                  Key inside secret must be "api_key".
                type: string
              clusterRegistration:
                description: |-
                  ClusterRegistration controls whether the controller registers a cluster with
                  Harness after agent creation. This is required to trigger AppProject creation,
                  which makes the agent and its Applications visible in the Harness UI.
                properties:
                  connectionType:
                    default: IN_CLUSTER
                    description: |-
                      ConnectionType determines the authentication method.
                        IN_CLUSTER      — agent runs inside the cluster being registered (default).
                                          Uses https://kubernetes.default.svc, no credentials needed.
                        SERVICE_ACCOUNT — remote cluster; requires CredentialsRef with bearerToken + caData.
                    enum:
                    - IN_CLUSTER
                    - SERVICE_ACCOUNT
                    type: string
                  credentialsRef:
                    description: |-
                      CredentialsRef is the name of a Secret in the same namespace containing
                      credentials for SERVICE_ACCOUNT connection type.
                      Supported keys:
                        bearerToken — Kubernetes service account token (required for SERVICE_ACCOUNT)
                        caData      — base64-encoded PEM CA certificate bundle
                        insecure    — "true" to skip TLS verification (local/dev only)
                    type: string
                  enabled:
                    default: false
                    description: |-
                      Enabled controls whether the controller registers a cluster after agent creation.
                      Defaults to false. Set to true to trigger AppProject creation automatically.
                    type: boolean
                  name:
                    description: |-
                      Name is the display name for this cluster in Harness.
                      Defaults to the HarnessGitopsAgent CR name if not set.
                    type: string
                  server:
                    default: https://kubernetes.default.svc
                    description: |-
                      Server is the Kubernetes API server URL to register.
                      Defaults to "https://kubernetes.default.svc" (in-cluster).
                      For remote clusters use the external API server URL.
                    type: string
                required:
                - enabled
                type: object
              identifier:
                description: Identifier is the unique identifier of the Harness GitOps
                  Agent
                type: string
              name:
                description: Name is the name of the Harness GitOps Agent
                type: string
              operator:
                description: Type of GitOps Operator ("ARGO", "FLAMINGO")
                type: string
              orgId:
                description: OrgId is the Harness Organization Identifier
                type: string
              projectId:
                description: ProjectId is the Harness Project Identifier
                type: string
              scope:
                default: PROJECT
                description: Scope of the agent (e.g., "ACCOUNT", "ORG", "PROJECT")
                type: string
              tokenSecretRef:
                description: |-
                  TokenSecretRef is the name of the Secret where the generated Agent Token will be stored.
                  The controller writes GITOPS_AGENT_TOKEN and ARGO_PROJECT_ID into this secret.
                type: string
              type:
                default: KUBERNETES
                description: Type of agent (e.g., "MANAGED_ARGO_PROVIDER")
                type: string
