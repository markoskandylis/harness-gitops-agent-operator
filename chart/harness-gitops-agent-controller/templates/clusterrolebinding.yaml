{{- if .Values.rbac.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "harness-gitops-agent-controller.fullname" . }}-manager
  labels:
    {{- include "harness-gitops-agent-controller.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "harness-gitops-agent-controller.fullname" . }}-manager
subjects:
  - kind: ServiceAccount
    name: {{ include "harness-gitops-agent-controller.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
