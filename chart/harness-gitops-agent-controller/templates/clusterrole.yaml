{{- if .Values.rbac.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "harness-gitops-agent-controller.fullname" . }}-manager
  labels:
    {{- include "harness-gitops-agent-controller.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create", "delete", "get", "list", "patch", "update", "watch"]
  - apiGroups: ["infrastructure.kandylis.co.uk"]
    resources: ["harnessgitopsagents"]
    verbs: ["create", "delete", "get", "list", "patch", "update", "watch"]
  - apiGroups: ["infrastructure.kandylis.co.uk"]
    resources: ["harnessgitopsagents/finalizers"]
    verbs: ["update"]
  - apiGroups: ["infrastructure.kandylis.co.uk"]
    resources: ["harnessgitopsagents/status"]
    verbs: ["get", "patch", "update"]
{{- end }}
